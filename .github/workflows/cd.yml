name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Docker image
        run: docker build -t ecodata:${{ github.ref_name }} .

      - name: Save image artifact
        run: docker save ecodata:${{ github.ref_name }} | gzip > ecodata.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecodata-${{ github.ref_name }}
          path: ecodata.tar.gz
